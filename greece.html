<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ancient Greece — The Classics Time Machine</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── FULL-SCREEN SVG BACKGROUND ──────────────────────── */
    #bg-scene {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* ── TOP NAV ──────────────────────────────────────────── */
    nav#top-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 20;
      background: rgba(5, 1, 1, 0.92);
      border-bottom: 2px solid #C9A84C;
      backdrop-filter: blur(6px);
    }

    .nav-inner {
      display: flex;
      align-items: stretch;
      max-width: 1300px;
      margin: 0 auto;
    }

    .nav-link {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 15px 6px;
      color: #C9A84C;
      text-decoration: none;
      font-size: clamp(8px, 1.05vw, 12px);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      border-right: 1px solid rgba(201, 168, 76, 0.15);
      text-align: center;
      line-height: 1.3;
      transition: background 0.2s, color 0.2s, text-shadow 0.2s;
    }
    .nav-link:last-child { border-right: none; }
    .nav-link:hover {
      background: rgba(201, 168, 76, 0.14);
      color: #FFD700;
      text-shadow: 0 0 14px rgba(255, 215, 0, 0.7);
    }

    /* ── BACK BUTTON ──────────────────────────────────────── */
    #back-btn {
      position: fixed;
      top: 58px;
      left: 16px;
      z-index: 21;
      color: rgba(201, 168, 76, 0.5);
      text-decoration: none;
      font-size: 10px;
      letter-spacing: 0.15em;
      font-family: 'Courier New', monospace;
      text-transform: uppercase;
      transition: color 0.2s;
      padding: 6px 0;
    }
    #back-btn:hover { color: #FFD700; }

    /* ── CENTRAL CONTENT ──────────────────────────────────── */
    #main-content {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px 130px;
      text-align: center;
      pointer-events: none;
    }

    /* ── ANIMATIONS ───────────────────────────────────────── */
    @keyframes textGlow {
      0%, 100% { filter: drop-shadow(0 0 10px rgba(255,200,60,0.35)); }
      50%       { filter: drop-shadow(0 0 28px rgba(255,200,60,0.85)); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    .main-title {
      font-size: clamp(3rem, 6.5vw, 6rem);
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-family: 'Courier New', monospace;
      background: linear-gradient(175deg, #FFE066 0%, #C9A84C 55%, #7A5C10 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: textGlow 4s ease-in-out infinite, fadeUp 1s ease 0.2s both;
      margin-bottom: 20px;
    }

    .main-quote {
      color: rgba(245, 215, 155, 0.78);
      font-size: clamp(1rem, 2.2vw, 1.45rem);
      font-style: italic;
      max-width: 580px;
      line-height: 1.6;
      animation: fadeUp 1s ease 0.6s both;
    }

    .quote-attr {
      color: rgba(201, 168, 76, 0.45);
      font-size: 10px;
      letter-spacing: 0.32em;
      font-family: 'Courier New', monospace;
      text-transform: uppercase;
      margin-top: 10px;
      animation: fadeUp 1s ease 0.9s both;
    }

    /* ── BATTLE BUTTON ────────────────────────────────────── */
    #battle-wrap {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 20;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px 20px 24px;
      background: linear-gradient(to top, rgba(3,0,0,0.97) 0%, transparent 100%);
    }

    #battle-btn {
      pointer-events: all;
      display: inline-flex;
      align-items: center;
      gap: 16px;
      background: linear-gradient(135deg, #5C0000, #8B1A1A, #5C0000);
      color: #FFD700;
      font-size: clamp(15px, 2vw, 22px);
      font-weight: bold;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      font-family: 'Courier New', monospace;
      text-decoration: none;
      padding: 18px 56px;
      border: 2px solid #C9A84C;
      border-radius: 2px;
      box-shadow: 0 0 28px rgba(100, 0, 0, 0.75),
                  0 0 60px rgba(100, 0, 0, 0.35),
                  inset 0 0 24px rgba(0,0,0,0.5);
      transition: all 0.25s ease;
      animation: fadeUp 1s ease 1.2s both;
    }
    #battle-btn:hover {
      background: linear-gradient(135deg, #7A0000, #C0392B, #7A0000);
      box-shadow: 0 0 40px rgba(180,0,0,0.9), 0 0 80px rgba(180,0,0,0.45);
      transform: scale(1.05);
      color: #FFFFFF;
      border-color: #FFD700;
      letter-spacing: 0.6em;
    }

<!-- ════════════════════════════════════════════════════════
     SVG BACKGROUND — BATTLE SCENE WITH HOPLITE SILHOUETTE
     ════════════════════════════════════════════════════════ -->
<svg id="bg-scene"
     viewBox="0 0 1400 900"
     preserveAspectRatio="xMidYMid slice"
     xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Battle sky: pre-dawn crimson -->

      <stop offset="0%"   stop-color="#07021C"/>
      <stop offset="18%"  stop-color="#360808"/>
      <stop offset="48%"  stop-color="#A82E0E"/>
      <stop offset="76%"  stop-color="#E25E0C"/>
      <stop offset="100%" stop-color="#F59018"/>

    <!-- Ground -->

      <stop offset="0%"   stop-color="#1A0806"/>
      <stop offset="100%" stop-color="#040101"/>
    </linearGradient>

    <!-- Vignette at bottom -->
    <linearGradient id="vig" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.85"/>
    </linearGradient>

    <!-- Top darkening -->
    <linearGradient id="topfade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#000" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </linearGradient>

    <!-- Horizon glow behind hoplite -->

      <stop offset="100%" stop-color="#FF3000" stop-opacity="0"/>

    <!-- Rim-light filter on hoplite (creates backlit glow) -->

                    flood-color="#E06010" flood-opacity="0.6"/>
    </filter>

    <!-- so scale transforms work consistently.                 -->

                        710,130 700,126 690,130 682,146 678,172 682,208"/>

<!-- ── JAVASCRIPT ────────────────────────────────────────────────────── -->
<script>
  // Subtle mouse-parallax: hoplite sways gently with cursor
  const hoplite = document.getElementById('main-hoplite');
  let ticking = false;

  document.addEventListener('mousemove', e => {
    if (ticking) return;
    ticking = true;
    requestAnimationFrame(() => {
      const cx = window.innerWidth  / 2;
      const cy = window.innerHeight / 2;
      const dx = (e.clientX - cx) / cx;  // –1 to +1
      const dy = (e.clientY - cy) / cy;
      hoplite.style.transform = `translate(${dx * 10}px, ${dy * 4}px)`;
      ticking = false;
    });
  });
</script>
